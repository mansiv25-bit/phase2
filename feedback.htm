      <h1 clas="heading2">Student profile & Course Portal</h1>
     <nav>

            <li> <a href="index.html">Home</a></li>

            </ul>
            </nav>

    <main>

<section class="feedback-container">
    <form>

        <h2>Give Your Feedback</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="number" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label>Rate Our Courses</label>
            <div class="options">
                <label><input type="radio" name="rating"> Excellent</label>
                <label><input type="radio" name="rating"> Good</label>
                <label><input type="radio" name="rating"> Average</label>
                <label><input type="radio" name="rating"> Poor</label>
            </div>
        </div>

        <div class="form-group">
            <label>Which courses are you interested in?</label>
            <div class="options">
                <label><input type="checkbox"> Web Development</label>
                <label><input type="checkbox"> Python</label>
                <label><input type="checkbox"> Data Structures</label>
                <label><input type="checkbox"> UI/UX</label>
            </div>
        </div>

        <div class="form-group">
            <label>How did you hear about us?</label>
            <select>
                <option>Select</option>
                <option>Google</option>
                <option>Friend</option>
                <option>Social Media</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Your Feedback</label>
            <textarea rows="4" placeholder="Write your feedback..."></textarea>
        </div>

        
        <button class="submit" type="submit">Submit Feedback</button>

    </form>
</section>
